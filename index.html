<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drylight — actionable intelligence</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090e;
    --surface: #0c0f16;
    --border: #151a24;
    --border-light: #1e2533;
    --accent: #38bdf8;
    --accent-hover: #7dd3fc;
    --white: #f1f5f9;
    --grey-100: #cbd5e1;
    --grey-300: #94a3b8;
    --grey-500: #64748b;
    --grey-700: #334155;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    max-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 55% 45% at 50% 40%, black 10%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 55% 45% at 50% 40%, black 10%, transparent 70%);
  }

  body::after {
    content: '';
    position: fixed;
    top: -250px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 350px;
    background: radial-gradient(ellipse, rgba(56,189,248,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 2vh 2rem;
    text-align: center;
  }
  .content-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 640px;
  }

  .logo-word {
    margin-bottom: 4vh;
    opacity: 0;
    animation: up 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
    font-family: 'Outfit', sans-serif;
    font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 0.9;
    text-transform: lowercase;
  }
  .logo-word .light {
    color: var(--accent);
  }
  .logo-word .ai {
    margin-left: 0.12em;
  }
  .logo-word .ai-i {
    color: var(--accent);
  }

  .etymology {
    margin-bottom: 0;
    padding: 1vh 2rem;
    opacity: 0;
    animation: up 0.6s 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    text-align: center;
    line-height: 2;
    font-family: 'Cormorant Garamond', serif;
  }
  .ety-word {
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.04em;
  }
  .ety-pronunciation {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--grey-300);
    margin-left: 6px;
  }
  .ety-pos {
    font-size: 0.9rem;
    font-style: italic;
    font-weight: 400;
    color: var(--grey-300);
    margin-left: 6px;
  }
  .ety-def {
    display: block;
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--grey-100);
    margin-top: 0;
    letter-spacing: 0.01em;
  }
  .ety-latin {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--grey-500);
    margin-left: 6px;
  }
  .ety-latin em {
    font-style: italic;
    color: var(--grey-300);
  }

  .rule {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin-bottom: 2vh;
    opacity: 0;
    animation: up 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .typer-wrap {
    margin-bottom: 1.5vh;
    opacity: 0;
    animation: up 0.6s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    width: 100%;
    max-width: 620px;
    height: 3em;
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    align-self: flex-start;
    overflow: hidden;
  }
  .terminal-body {
    display: flex;
    align-items: flex-start;
    text-align: left;
  }
  .terminal-prompt {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.7rem, 1vw, 0.78rem);
    color: var(--grey-500);
    margin-right: 8px;
    flex-shrink: 0;
    user-select: none;
    line-height: 1.6;
  }
  .typer {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.7rem, 1vw, 0.78rem);
    font-weight: 400;
    color: var(--accent);
    line-height: 1.6;
  }
  .typer-text { word-break: break-word; }
  .typer-cursor {
    display: none;
  }
  @keyframes blink { 0%,100% { opacity: 0.7; } 50% { opacity: 0; } }

  .tagline {
    font-weight: 500;
    font-size: clamp(1.4rem, 2.8vw, 2rem);
    color: var(--white);
    line-height: 1.3;
    max-width: 500px;
    letter-spacing: -0.02em;
    margin-bottom: 8vh;
    opacity: 0;
    animation: up 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .tagline em {
    font-style: italic;
    color: var(--accent);
    font-weight: 500;
  }

  .cta-area {
    opacity: 0;
    animation: up 0.6s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    padding: 0.7rem 1.8rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    border-radius: 3px;
  }
  .cta-btn:hover { background: var(--accent-hover); box-shadow: 0 0 24px rgba(56,189,248,0.2); }
  .cta-btn svg { transition: transform 0.2s ease; }
  .cta-btn:hover svg { transform: translateX(3px); }
  .cta-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.54rem;
    color: var(--grey-700);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 1vh 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.52rem;
    color: var(--grey-700);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0;
    animation: fade 0.6s 1s ease forwards;
  }
  footer a { color: var(--grey-700); text-decoration: none; }

  @keyframes up {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 640px) {
    main { padding: 1.5vh 1.5rem; }
    .logo-word { font-size: clamp(2rem, 10vw, 3rem); }
    .etymology { line-height: 1.8; margin-bottom: 2vh; }
    .ety-word { font-size: 0.85rem; }
    .ety-pronunciation, .ety-pos { font-size: 0.62rem; }
    .ety-def { font-size: 0.7rem; }
    .ety-latin { font-size: 0.58rem; }
    .rule { margin-bottom: 2vh; }
    .typer-wrap { margin-bottom: 2vh; min-height: 4em; }
    .tagline { font-size: clamp(1.1rem, 5vw, 1.4rem); margin-bottom: 3vh; }
    .cta-area { gap: 0.6rem; }
    .cta-btn { padding: 0.6rem 1.4rem; font-size: 0.65rem; }
  }

  @media (max-height: 700px) {
    .logo-word { font-size: clamp(2rem, 6vw, 3rem); margin-bottom: 1vh; }
    .etymology { margin-bottom: 1.5vh; line-height: 1.7; }
    .rule { margin-bottom: 1.5vh; }
    .typer-wrap { margin-bottom: 1.5vh; min-height: 2.5em; }
    .tagline { margin-bottom: 2vh; }
    .cta-area { gap: 0.5rem; }
  }
</style>
</head>
<body>

<main>
  <div class="content-center">
    <div class="logo-word">dry<span class="light">light</span></div>

    <div class="rule"></div>

    <p class="tagline">actionable <span style="color:var(--accent)">i</span>ntelligence</p>

    <div class="typer-wrap">
      <div class="terminal-body">
        <span class="terminal-prompt">&gt;</span>
        <div class="typer">
          <span class="typer-text" id="typer"></span><span class="typer-cursor"></span>
        </div>
      </div>
    </div>

    <div class="cta-area">
      <a href="https://forms.gle/uLDXbLzVohhUBYRM6" target="_blank" class="cta-btn">
        Request Early Access
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <p class="cta-note">GPU infra teams only</p>
    </div>
  </div>
</main>

<div class="etymology">
  <span class="ety-word">dry<span style="color:var(--accent)">light</span></span>
  <span class="ety-pronunciation">/ˈdraɪˌlaɪt/</span>
  <span class="ety-pos">n.</span>
  <span class="ety-latin">[Latin <em>lumen siccum</em>]</span>
  <span class="ety-def">pure insight, unclouded by noise or emotion.</span>
</div>

<footer>
  <span>© 2026 <span style="font-family:'Outfit',sans-serif;font-weight:600;font-size:0.82rem;letter-spacing:-0.04em;text-transform:lowercase;color:var(--white);">dry<span style="color:var(--accent)">light</span> a<span style="color:var(--accent)">i</span></span>, Inc.</span>
</footer>

<script>
(function() {
  const words = [
    'switch-5101 buffer overflow → 34% token throughput drop on prod-llm; critical in 9 min',
    'gpu-14 thermal trend will trigger throttle in 6 min; rerouting inference to gpu-22',
    '$41K/day in idle H100 compute detected across us-east; 3 nodes reclaimable now',
    'NFS write stall on /checkpoint caused training job 7b3f to silently checkpoint-corrupt',
    'TTFT jumped 220ms → 1.1s; root cause: KV cache eviction from co-located batch job',
    'spine-02 congestion rippling into rack-07 and rack-12; 5 training jobs at risk',
    'gpu-31 ECC error rate 12x baseline; predicted DIMM failure within 48 hours',
    'driver v535.129 on node-22 silently dropping 8% FLOPS vs fleet on v535.161',
    'correlated: RDMA retry storm on switch-04 + 3x inference latency on downstream nodes',
    'model serving cost per token up 23% this week; root cause: fragmented GPU scheduling'
  ];
  const el = document.getElementById('typer');
  let wi = 0, ci = 0;

  function tick() {
    const w = words[wi];
    ci++;
    el.textContent = w.slice(0, ci);
    if (ci === w.length) {
      const wordCount = w.split(' ').length;
      const holdTime = Math.max(2000, wordCount * 333) + 1000;
      setTimeout(() => {
        el.textContent = '';
        ci = 0;
        wi = (wi + 1) % words.length;
        setTimeout(tick, 200);
      }, holdTime);
      return;
    }
    setTimeout(tick, 18);
  }

  setTimeout(tick, 1400);
})();
</script>
</body>
</html>
